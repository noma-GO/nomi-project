name: Build Android APK & AAB (Cloud Builder)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub browser interface on phone

jobs:
  build:
    name: Build Native Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v22)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Web Dependencies
        run: npm ci || npm install

      - name: Build Web Assets & Sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Setup Java JDK (v21)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Build Debug APK (For direct phone installation)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Release APK (Unsigned)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Build Release App Bundle (AAB for Google Play)
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Locate and Rename Artifacts for Ease of Use
        run: |
          mkdir -p build-outputs
          # Copy debug APK
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk build-outputs/Nomi-Debug-Testing.apk
          fi
          # Copy release APK
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk build-outputs/Nomi-Release-Unsigned.apk
          fi
          # Copy release AAB
          if [ -f android/app/build/outputs/bundle/release/app-release-unsigned.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release-unsigned.aab build-outputs/Nomi-PlayStore-Unsigned.aab
          elif [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab build-outputs/Nomi-PlayStore-Unsigned.aab
          fi

      - name: Sign Release Artifacts with Self-Signed Keystore
        run: |
          # 1. Generate Keystore
          keytool -genkey -v -keystore release.keystore \
            -alias nomi-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass nomipassword \
            -keypass nomipassword \
            -dname "CN=Nomi, OU=Nomi, O=Nomi, L=Nomi, S=Nomi, C=US"
          
          # 2. Sign the Release APK using apksigner
          if [ -f build-outputs/Nomi-Release-Unsigned.apk ]; then
            APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
            $APKSIGNER sign --ks release.keystore \
              --ks-pass pass:nomipassword \
              --key-pass pass:nomipassword \
              --out build-outputs/Nomi-Release-Signed.apk \
              build-outputs/Nomi-Release-Unsigned.apk
            echo "Successfully signed Release APK!"
            $APKSIGNER verify build-outputs/Nomi-Release-Signed.apk
          else
            echo "No Release APK found to sign!"
          fi

          # 3. Sign the Release AAB using jarsigner
          if [ -f build-outputs/Nomi-PlayStore-Unsigned.aab ]; then
            cp build-outputs/Nomi-PlayStore-Unsigned.aab build-outputs/Nomi-PlayStore-Signed.aab
            jarsigner -keystore release.keystore \
              -storepass nomipassword \
              -keypass nomipassword \
              build-outputs/Nomi-PlayStore-Signed.aab \
              nomi-alias
            echo "Successfully signed Release AAB!"
          else
            echo "No Release AAB found to sign!"
          fi

      - name: Upload Testing APK to GitHub Actions
        uses: actions/upload-artifact@v4
        with:
          name: Nomi-Android-Testing-APK
          path: build-outputs/Nomi-Debug-Testing.apk
          if-no-files-found: error

      - name: Upload Signed Release APK (Directly installable on phone)
        uses: actions/upload-artifact@v4
        with:
          name: Nomi-Android-Release-Signed-APK
          path: build-outputs/Nomi-Release-Signed.apk
          if-no-files-found: error

      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Nomi-Android-Release-Unsigned-APK
          path: build-outputs/Nomi-Release-Unsigned.apk
          if-no-files-found: warn

      - name: Upload Signed Play Store Bundle (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Nomi-Android-PlayStore-Signed-AAB
          path: build-outputs/Nomi-PlayStore-Signed.aab
          if-no-files-found: warn

      - name: Upload Unsigned Play Store Bundle (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: Nomi-Android-PlayStore-Unsigned-AAB
          path: build-outputs/Nomi-PlayStore-Unsigned.aab
          if-no-files-found: warn
