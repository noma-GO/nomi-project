<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0f172a" />
    <title>Nomi - Intelligent Traveler Companion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      (function() {
        var showCrash = function(title, message, stack) {
          console.error("[NOMI CRASH] " + title + ": " + message, stack);
          try {
            var div = document.createElement("div");
            div.style.position = "fixed";
            div.style.top = "0";
            div.style.left = "0";
            div.style.width = "100%";
            div.style.height = "100%";
            div.style.backgroundColor = "#991b1b";
            div.style.color = "#ffffff";
            div.style.padding = "24px";
            div.style.fontFamily = "monospace";
            div.style.fontSize = "14px";
            div.style.zIndex = "999999";
            div.style.overflowY = "auto";
            div.style.boxSizing = "border-box";
            
            div.innerHTML = '<h1 style="font-size: 20px; font-weight: bold; margin-bottom: 12px; border-bottom: 1px solid #fca5a5; padding-bottom: 8px;">🚨 Nomi App Launch Crash: ' + title + '</h1>' +
              '<p style="font-weight: bold; font-size: 16px; margin-bottom: 16px;">' + message + '</p>' +
              (stack ? '<h2 style="font-size: 14px; font-weight: bold; margin-bottom: 8px; color: #fca5a5;">Stack Trace:</h2><pre style="background-color: #7f1d1d; padding: 12px; border-radius: 6px; overflow-x: auto; white-space: pre-wrap; font-size: 12px;">' + stack + '</pre>' : '') +
              '<p style="margin-top: 24px; font-size: 11px; color: #fca5a5;">Please screenshot this screen to help the developer fix the issue.</p>';
            
            if (document.body) {
              document.body.appendChild(div);
            } else {
              window.addEventListener("DOMContentLoaded", function() {
                document.body.appendChild(div);
              });
            }
          } catch(e) {
            console.error("Failed to inject error div", e);
          }
        };

        window.onerror = function(message, source, lineno, colno, error) {
          showCrash("Uncaught Runtime Error", String(message), error ? error.stack : "at " + source + ":" + lineno + ":" + colno);
          return false;
        };

        window.addEventListener("unhandledrejection", function(event) {
          var reason = event.reason || {};
          showCrash("Unhandled Promise Rejection", String(reason.message || reason), reason.stack);
        });
        
        console.log("[NOMI HTML] Global crash listeners registered in head.");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
